name: C Project Build and Release

on:
  push:
    branches: [ "main" ]
    tags:
      - "*"
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # if: github.repository == 'crispy-cookie/xdotool-deb'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxtst-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxinerama-dev \
            checkinstall \
            build-essential

      - name: Build Project
        run: make

      - name: Create Package with checkinstall
        run: |
          VERSION="v4.$(date +'%Y%m%d')"
          sudo checkinstall --fstrans=no --install=no --nodoc  --pkgname="xdotool" --pkgversion="v4.$(date +'%Y%m%d')"

      - name: Upload Artifact for Release
        #if: startsWith(github.ref, 'refs/tags/')
        # Use bash to extract the tag name from the GitHub ref
        # run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
        # uses: release-drafter/release-drafter@v5
        uses: softprops/action-gh-release@v1
        with:
          disable-autolabeler: true
          # Override the Release name/tag/version with the actual tag name
          name: ${ VERSION }
          tag: ${ VERSION }
          version: ${ VERSION }
          # Publish the Release
          publish: true
          files: |
            *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
